<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biovet Milhas</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>
  <div id="transition-screen" class="screen active transition-screen">
    <div class="transition-card">
      <img src="assets/logo-biovetfarma.png" class="transition-logo" alt="Biovetfarma">
      <h2 class="transition-title">Preparando as suas milhas</h2>
      <p class="transition-subtitle">Buscando seus dados...</p>
      <div class="magic-loader"><span></span><span></span><span></span></div>
    </div>
  </div>

  <section id="auth-view" class="view">
    <div class="panel">
      <img src="assets/logo-biovetfarma.png" class="brand-logo" alt="Biovetfarma">

      <form id="login-form" class="form">
        <h2>Entrar</h2>
        <label for="login-email">E-mail</label>
        <input id="login-email" type="email" autocomplete="email" required />
        <label for="login-password">Senha</label>
        <input id="login-password" type="password" autocomplete="current-password" required />
        <p id="login-error" class="form-info"></p>
        <button type="submit" class="btn btn-primary">Entrar</button>
        <button type="button" id="show-reset" class="btn btn-ghost">Esqueci minha senha</button>
        <button type="button" id="show-register" class="btn btn-ghost">Criar conta</button>
      </form>

      <form id="register-form" class="form hidden">
        <h2>Criar conta</h2>
        <label for="register-name">Nome completo</label>
        <input id="register-name" type="text" required />
        <label for="register-cpf">CPF</label>
        <input id="register-cpf" type="text" required />
        <label for="register-dob">Data de nascimento</label>
        <input id="register-dob" type="date" required />
        <label for="register-crmv">CRMV</label>
        <input id="register-crmv" type="text" required />
        <label for="register-email">E-mail</label>
        <input id="register-email" type="email" required />
        <label for="register-password">Senha</label>
        <input id="register-password" type="password" required />
        <label for="register-password-confirm">Confirmar senha</label>
        <input id="register-password-confirm" type="password" required />
        <p id="register-error" class="form-info"></p>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
        <button type="button" id="show-login-from-register" class="btn btn-ghost">Voltar para login</button>
      </form>

      <form id="reset-form" class="form hidden">
        <h2>Recuperar senha</h2>
        <label for="reset-email">E-mail cadastrado</label>
        <input id="reset-email" type="email" required />
        <p id="reset-info" class="form-info"></p>
        <button type="submit" class="btn btn-primary">Enviar link</button>
        <button type="button" id="show-login-from-reset" class="btn btn-ghost">Voltar para login</button>
      </form>
    </div>
  </section>

  <section id="home-view" class="view">
    <div class="home-shell">
      <header class="app-header">
        <p class="app-subtitle">Olá, <span id="user-name">Parceiro</span></p>
        <button id="logout-btn" class="btn btn-ghost btn-sm" type="button">Sair</button>
      </header>

      <section class="home-card">
        <h2>Seu cartão Biovet Milhas</h2>
        <p class="home-text">Confira seus dados e saldo atualizado.</p>

        <article class="milhas-card">
          <div class="milhas-card-inner">
            <div class="milhas-card-top">
              <span class="milhas-program-label">PROGRAMA BIOVET MILHAS</span>
            </div>

            <div class="milhas-card-middle">
              <p class="milhas-points-label">Pontuação</p>
              <p id="points-value" class="milhas-points-value">0 pontos</p>
            </div>

            <div class="milhas-card-bottom">
              <div class="milhas-card-field">
                <span class="milhas-field-label">Nome</span>
                <strong id="card-user-name" class="milhas-field-value">---</strong>
              </div>
              <div class="milhas-card-field">
                <span class="milhas-field-label">CRMV</span>
                <strong id="card-user-crmv" class="milhas-field-value">---</strong>
              </div>
            </div>
          </div>
        </article>

        <a id="whatsapp-link" class="btn btn-whatsapp" href="#" target="_blank" rel="noopener noreferrer">
          Trocar pontos no WhatsApp
        </a>
      </section>
    </div>
  </section>

  <script type="module" src="app.js"></script>
  <script>
    const transitionScreen = document.getElementById('transition-screen');
    window.addEventListener('load', () => {
      setTimeout(() => transitionScreen.classList.remove('active'), 900);
    });
    window.showLoadingOverlay = () => transitionScreen.classList.add('active');
    window.hideLoadingOverlay = () => transitionScreen.classList.remove('active');
  </script>
  
  </body>
  </html>
