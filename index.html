<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biovet Milhas</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>
  
  <div id="boot-overlay" class="bm-overlay">
  <div class="bm-loader-wrap">
    <div class="bm-glow"></div>
    <img src="./assets/logo-biovetfarma.png" alt="Biovetfarma" class="bm-loader-logo">
    <div class="bm-ring"></div>
    <div class="bm-loader-text">Preparando suas milhas...</div>
    <div class="bm-loader-subtext">Entrando no seu painel</div>
  </div>
</div>

<!-- BOOT -->
<div id="boot-screen" class="screen active">
  <img src="assets/logo-biovetfarma.png" class="logo">
  <h1>Biovet Milhas</h1>
  <p>Carregando...</p>
</div>

<!-- LOGIN -->
<div id="login-screen" class="screen">
  <div class="card">
    <h2>Entrar</h2>
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- TRANSIÇÃO -->
<div id="transition-screen" class="screen">
  <div class="transition-card">
    <div class="transition-glow"></div>
    <img src="assets/logo-biovetfarma.png" class="transition-logo">

    <h2 class="transition-title">Preparando suas milhas</h2>
    <p class="transition-subtitle">Buscando seus pontos...</p>

    <div class="magic-loader">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <div class="card">
    <h2>Bem-vindo</h2>
    <h1 id="pontos">0</h1>
    <p>Biovet Milhas</p>
    <button>Trocar pontos</button>
  </div>
</div>

<script src="app.js"></script>

<script>
const boot = document.getElementById("boot-screen");
const loginScreen = document.getElementById("login-screen");
const transition = document.getElementById("transition-screen");
const app = document.getElementById("app-screen");

function show(screen){
  [boot, loginScreen, transition, app].forEach(s=>{
    s.classList.remove("active");
  });
  screen.classList.add("active");
}

function init(){
  show(boot);

  setTimeout(()=>{
    const user = localStorage.getItem("user");

    if(user){
      goToApp();
    } else {
      show(loginScreen);
    }

  }, 800);
}

function login(){
  localStorage.setItem("user","ok");
  goToApp();
}

async function goToApp(){
  show(transition);

  await new Promise(r => setTimeout(r, 1200));

  document.getElementById("pontos").innerText = "1200";

  show(app);
}

init();
</script>

</body>
</html>
