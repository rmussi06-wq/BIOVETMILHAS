<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Biovetfarma — Parceiro Vet</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="stylesheet" href="styles.css"/>
  <meta name="theme-color" content="#3CB3C0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" class="splash">
    <div class="splash-logo-wrap">
      <img src="assets/logo-biovetfarma.png" class="splash-logo" alt="Biovetfarma">
    </div>
    <p class="splash-tagline">Biovetfarma</p>
    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- AUTH VIEW -->
  <section id="auth-view" class="view">

    <!-- Tela de boas-vindas -->
    <div id="welcome-screen" class="welcome-panel">
      <div class="welcome-hero">
        <img src="assets/logo-biovetfarma.png" class="welcome-logo" alt="Biovetfarma">
        <h1 class="welcome-title">Biovetfarma</h1>
      </div>
      <div class="welcome-actions">
        <button id="btn-go-login" class="btn btn-primary btn-block">ENTRAR</button>
        <button id="btn-go-register" class="btn btn-outline btn-block">CRIAR CONTA</button>
      </div>
    </div>

    <!-- Painel de formulários -->
    <div id="forms-panel" class="forms-panel hidden">

      <div class="forms-header">
        <button id="back-to-welcome" class="btn-back" aria-label="Voltar">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <img src="assets/logo-biovetfarma.png" class="forms-logo" alt="Biovetfarma">
      </div>

      <!-- LOGIN -->
      <form id="login-form" class="form">
        <h2 class="form-title">Entrar</h2>

        <div class="input-group">
          <label for="login-email">E-mail</label>
          <input id="login-email" type="email" autocomplete="email" placeholder="seu@email.com" required />
        </div>

        <div class="input-group">
          <label for="login-password">Senha</label>
          <div class="input-password-wrap">
            <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
            <button type="button" class="btn-eye" data-target="login-password" aria-label="Mostrar senha">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
          </div>
        </div>

        <p id="login-error" class="form-msg"></p>

        <button type="submit" class="btn btn-primary btn-block btn-tall">ENTRAR</button>
        <button type="button" id="show-reset" class="btn btn-ghost btn-block">Esqueci minha senha</button>
        <button type="button" id="show-register" class="btn btn-ghost btn-block">Criar conta</button>
      </form>

      <!-- CADASTRO -->
      <form id="register-form" class="form hidden">
        <h2 class="form-title">Criar conta</h2>

        <div class="input-group">
          <label for="register-name">Nome completo</label>
          <input id="register-name" type="text" placeholder="Dr(a). Nome Sobrenome" required />
        </div>

        <div class="input-row">
          <div class="input-group">
            <label for="register-cpf">CPF</label>
            <input id="register-cpf" type="text" placeholder="000.000.000-00" required />
          </div>
          <div class="input-group">
            <label for="register-crmv">CRMV</label>
            <input id="register-crmv" type="text" placeholder="SP-00000" required />
          </div>
        </div>

        <div class="input-group">
          <label for="register-dob">Data de nascimento</label>
          <input id="register-dob" type="date" required />
        </div>

        <div class="input-group">
          <label for="register-email">E-mail</label>
          <input id="register-email" type="email" placeholder="seu@email.com" required />
        </div>

        <div class="input-group">
          <label for="register-password">Senha</label>
          <div class="input-password-wrap">
            <input id="register-password" type="password" placeholder="Mín. 6 caracteres" required />
            <button type="button" class="btn-eye" data-target="register-password" aria-label="Mostrar senha">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="input-group">
          <label for="register-password-confirm">Confirmar senha</label>
          <div class="input-password-wrap">
            <input id="register-password-confirm" type="password" placeholder="Repita a senha" required />
            <button type="button" class="btn-eye" data-target="register-password-confirm" aria-label="Mostrar senha">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
          </div>
        </div>

        <p id="register-error" class="form-msg"></p>

        <button type="submit" class="btn btn-primary btn-block btn-tall">CADASTRAR</button>
        <button type="button" id="show-login-from-register" class="btn btn-ghost btn-block">Já tenho uma conta</button>
      </form>

      <!-- RESET -->
      <form id="reset-form" class="form hidden">
        <h2 class="form-title">Recuperar senha</h2>
        <p class="form-desc">Informe seu e-mail e enviaremos um link para redefinir sua senha.</p>

        <div class="input-group">
          <label for="reset-email">E-mail cadastrado</label>
          <input id="reset-email" type="email" placeholder="seu@email.com" required />
        </div>

        <p id="reset-info" class="form-msg"></p>

        <button type="submit" class="btn btn-primary btn-block btn-tall">ENVIAR LINK</button>
        <button type="button" id="show-login-from-reset" class="btn btn-ghost btn-block">Voltar para login</button>
      </form>

    </div>

  </section>

  <!-- HOME VIEW -->
  <section id="home-view" class="view">
    <div class="home-shell">

      <header class="app-header">
        <img src="assets/logo-biovetfarma.png" class="header-logo" alt="Biovetfarma">
        <button id="logout-btn" class="btn-icon-logout" type="button" aria-label="Sair">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </header>

      <div class="greeting-section">
        <p class="greeting-label">Olá,</p>
        <p class="greeting-name" id="user-name">Parceiro</p>
      </div>

      <div class="milhas-card">
        <div class="milhas-card-shine"></div>
        <div class="milhas-card-content">
          <div class="milhas-card-top">
            <span class="milhas-badge">⭐ BIOVET MILHAS</span>
          </div>
          <div class="milhas-card-middle">
            <p class="milhas-label">Sua pontuação</p>
            <p id="points-value" class="milhas-value">0</p>
            <p class="milhas-unit">pontos</p>
          </div>
          <div class="milhas-card-bottom">
            <div class="milhas-field">
              <span class="milhas-field-label">NOME</span>
              <strong id="card-user-name" class="milhas-field-value">---</strong>
            </div>
            <div class="milhas-field milhas-field--right">
              <span class="milhas-field-label">CRMV</span>
              <strong id="card-user-crmv" class="milhas-field-value">---</strong>
            </div>
          </div>
        </div>
      </div>

      <a id="whatsapp-link" class="btn btn-whatsapp" href="#" target="_blank" rel="noopener noreferrer">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
        </svg>
        TROCAR PONTOS NO WHATSAPP
      </a>

    </div>
  </section>

  <script>
    const splash = document.getElementById('splash');

    window.addEventListener('load', () => {
      setTimeout(() => {
        splash.classList.add('splash--out');
        setTimeout(() => {
          splash.style.display = 'none';
          // FIX: Garante que auth-view fica ativo após o splash
          const authView = document.getElementById('auth-view');
          const homeView = document.getElementById('home-view');
          if (!homeView.classList.contains('active') && !authView.classList.contains('active')) {
            authView.classList.add('active');
          }
        }, 600);
      }, 1800);
    });

    window.showLoadingOverlay = () => {
      splash.style.display = 'flex';
      splash.classList.remove('splash--out');
    };
    window.hideLoadingOverlay = () => {
      splash.classList.add('splash--out');
      setTimeout(() => { splash.style.display = 'none'; }, 500);
    };
  </script>

  <script type="module" src="app.js"></script>

</body>
</html>
